<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sketch</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrollbars for full-screen canvas */
            font-family: Arial, sans-serif;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none; /* Allow mouse events to pass through to canvas */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .back-link, h1, p {
            pointer-events: auto; /* Re-enable clicks for links and text selection */
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            margin: 5px;
        }
        .back-link {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="ui-layer">
        <a href="index.html" class="back-link">← Back to Home</a>
        <h1>Lamp Post to Cutlery</h1>
        <p>Click and hold to transform!</p>
    </div>
    <script src="sketch.js"></script>
</body>
</html>
